# ===================================================================
# Configuração Global (Aplicada a todos os perfis)
# ===================================================================
spring:
  application:
    name: sistema-pedidos
  
  # Perfil ativo quando nenhum outro é especificado (ex: java -jar app.jar)
  profiles:
    active: dev

  # Habilita Virtual Threads (requer Java 21+)
  threads:
    virtual:
      enabled: true

  # Configuração do Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: grupo-pedidos
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.sistemapedidos.api.dto"

  # Configuração do envio de email
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    # ATENÇÃO: É uma boa prática usar variáveis de ambiente para credenciais.
    username: ${MAIL_USERNAME:seu_usuario_aqui}
    password: ${MAIL_PASSWORD:sua_senha_aqui}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  error:
    include-message: always
    include-binding-errors: always

---
# ===================================================================
# Configuração de Desenvolvimento (PostgreSQL)
# Ativado com o perfil 'dev'
# ===================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/pedidos_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Performance: Ajuda o Postgres a lidar com IDs em lote
        jdbc:
          batch_size: 20
          order_inserts: true

---
# ===================================================================
# Configuração para Testes (H2 In-Memory)
# Ativado com o perfil 'test'
# ===================================================================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    # URL ajustada para estabilidade em testes de integração
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true # Útil para depurar se o banco real está populado

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    # Garante que o Hibernate crie o schema antes de rodar os testes
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
